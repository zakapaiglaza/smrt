version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smrt_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smrt_network

  nginx:
    image: nginx:1.25-alpine
    container_name: smrt_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - smrt_network

  mysql:
    image: mysql:8.0
    container_name: smrt_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: smrt
      MYSQL_USER: smrt
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "smrt", "-psecret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - smrt_network

networks:
  smrt_network:
    driver: bridge

volumes:
  mysql_data:
